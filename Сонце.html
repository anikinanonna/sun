<h2> Со́нце — зоря, що є центром Сонячної системи. Це майже ідеальна куля з гарячої плазми, розігрітої до світіння термоядерними реакціями, що йдуть у її надрах. Навколо Сонця обертаються Земля та інші планети, як і комети, астероїди, метеороїди, космічний пил та інші дрібні об'єкти.</h2>
